<style>

        margin: 0; padding: 0;

        font-family: 'Segoe UI', sans-serif;

        background-size: cover;

    .hud-container { 
        margin: -100px auto 0 auto; /* Pulls the HUD up over the image */

        border: 1px solid rgba(255, 255, 255, 0.1); 
        border-radius: 4px; 
        padding: 30px; 
        width: 500px; 
        max-height: 60vh; 
        overflow-y: auto; 
        color: #E8E8E8;
