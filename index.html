<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        body { 
            margin: 0; padding: 0; 
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; 
            background: transparent; /* No white background */
            font-family: 'Segoe UI', sans-serif; 
        }
        
        /* This wrapper holds your background image for the top half */
        .bg-wrapper {
            position: absolute; top: 0; left: 0; width: 100%; height: 50vh;
            background-image: url('closet.jpg'); /* Ensure this filename is exact */
            background-size: cover; background-position: top; z-index: -1;
        }

        .hud-container { 
            background: rgba(40, 40, 40, 0.65); /* Smokey transparency */
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 4px; 
            padding: 25px; 
            width: 600px; 
            max-height: 80vh; 
            overflow-y: auto; 
            color: #E8E8E8; 
        }
        
        /* All other styles remain the same for functionality */
        .nav-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .nav-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #E8E8E8; padding: 15px; flex: 1; text-transform: uppercase; font-weight: bold; font-size: 13px; cursor: pointer; }
        .folder { margin-top: 15px; }
        .header { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 14px; margin-bottom: 10px; }
        .content { display: none; padding-left: 20px; }
        .show { display: block; }
        .category { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 14px; gap: 15px; }
        .slot-group { display: flex; flex: 1; gap: 5px; }
        .style-btn { flex: 1; height: 30px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        .remove-btn { margin-top: 20px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(200, 50, 50, 0.4); color: #ffcccc; padding: 15px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="bg-wrapper"></div>
    <div class="hud-container">
        <div class="nav-row">
            <button class="nav-btn" onclick="toggle('nude-f')">Nude</button>
            <button class="nav-btn" onclick="toggle('dresser-f')">Dresser</button>
            <button class="nav-btn" onclick="toggle('closet-f')">Closet</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="toggle('wardrobe-f')">Wardrobe</button>
            <button class="nav-btn">Minimize</button>
        </div>
        </div>
    <script>
        function toggle(id) { document.getElementById(id).classList.toggle('show'); }
    </script>
</body>
</html>
