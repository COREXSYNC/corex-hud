<!DOCTYPE html>
<html>
<head>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; text-align: center; padding: 10px; }
        h2 { border-bottom: 1px solid #444; padding-bottom: 10px; }
        h3 { color: #aaa; margin-top: 20px; }
        .btn { display: block; width: 90%; margin: 5px auto; padding: 12px; background: #222; color: #fff; border: 1px solid #444; text-transform: uppercase; cursor: pointer; font-weight: bold; }
        .btn:hover { background: #333; }
    </style>
</head>
<body>

    <h2>Corex_Sync Wardrobe</h2>

    <form action="" method="POST">
        <button type="submit" class="btn" name="cmd" value="Nude,remove">Nude</button>
    </form>

    <h3>Dresser</h3>
    <form action="" method="POST">
        <button type="submit" class="btn" name="cmd" value="Dresser/Lounge,style1">Lounge</button>
        <button type="submit" class="btn" name="cmd" value="Dresser/Pj's,style1">Pj's</button>
        <button type="submit" class="btn" name="cmd" value="Dresser/Swimwear,style1">Swimwear</button>
        <button type="submit" class="btn" name="cmd" value="Dresser/Undies,style1">Undies</button>
    </form>

    <h3>Closet</h3>
    <form action="" method="POST">
        <button type="submit" class="btn" name="cmd" value="Closet/Dresses,style1">Dresses</button>
        <button type="submit" class="btn" name="cmd" value="Closet/Pants,style1">Pants</button>
        <button type="submit" class="btn" name="cmd" value="Closet/Skirts,style1">Skirts</button>
    </form>

    <h3>Wardrobe</h3>
    <form action="" method="POST">
        <button type="submit" class="btn" name="cmd" value="Wardrobe/Casual,style1">Casual</button>
        <button type="submit" class="btn" name="cmd" value="Wardrobe/Club,style1">Club</button>
        <button type="submit" class="btn" name="cmd" value="Wardrobe/Formal,style1">Formal</button>
    </form>

</body>
</html>
