<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <title>COREX // SYNC</title>
    <style>
        html, body { margin: 0; padding: 0; width: 100%; height: 100vh; background: url('closet.jpg') no-repeat center center !important; background-size: cover !important; font-family: 'Montserrat', sans-serif; overflow: hidden; color: #ffffff; }
        .hud-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            background: rgba(30, 30, 30, 0.25) !important; backdrop-filter: blur(20px); 
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 8px; 
            padding: 30px; width: 85%; height: 85%; overflow-y: auto; display: flex; gap: 40px; }
        .hud-container::-webkit-scrollbar { display: none; }
        .hud-title { position: absolute; top: 20px; left: 0; right: 0; text-align: center; font-size: 42px; font-weight: 300; text-transform: uppercase; letter-spacing: 8px; }
        .nav-column { flex: 1; display: flex; flex-direction: column; gap: 30px; padding-top: 80px; }
        .nav-btn { background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 15px; text-transform: uppercase; font-weight: 300; cursor: pointer; width: 100%; font-size: 22px; letter-spacing: 3px; font-family: 'Montserrat', sans-serif; }
        .remove-hud-btn { margin-top: auto; background: rgba(180, 60, 60, 0.3) !important; border: 1px solid rgba(255, 255, 255, 0.2) !important; }
        .glow-active { border: 2px solid #ffffff !important; box-shadow: 0 0 15px #ffffff !important; }
        .content-column { flex: 2; padding-top: 80px; }
        .folder { display: none; margin-top: 5px; }
        .folder.show { display: block; }
        .header { background: rgba(255, 255, 255, 0.05); padding: 15px; cursor: pointer; margin-top: 5px; text-transform: uppercase; font-weight: 300; letter-spacing: 1px; font-size: 24px; }
        .sub-content { display: none; padding-left: 20px; }
        .sub-content.show { display: block; }
        .cat-container { display: flex; align-items: center; gap: 10px; margin: 8px 0; }
        .cat-row { padding: 8px; font-weight: 300; letter-spacing: 1px; font-size: 18px; min-width: 160px; }
        .slot-grid { display: flex; gap: 5px; }
        .slot-small { width: 30px; height: 35px; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        .remove-btn { margin-top: 20px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 12px; width: 100%; text-transform: uppercase; font-weight: 300; cursor: pointer; letter-spacing: 1px; font-size: 24px; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="hud-title">COREX // SYNC</div>
    <div class="nav-column">
        <button class="nav-btn" onclick="handleNavClick('wardrobe-f', this)">Wardrobe</button>
        <button class="nav-btn" onclick="handleNavClick('dresser-f', this)">Dresser</button>
        <button class="nav-btn" onclick="handleNavClick('closet-f', this)">Closet</button>
        <button class="nav-btn" onclick="handleNavClick('nude-f', this)">Nude</button>
        <button class="nav-btn remove-hud-btn" onclick="flashGlow(this, 'remove_hud')">Remove HUD</button>
    </div>

    <div class="content-column">
        <!-- Nude -->
        <div id="nude-f" class="folder">
            <div class="cat-container"><div class="cat-row">Nude Options</div><div class="slot-grid">
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|1')"></div>
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|2')"></div>
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|3')"></div>
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|4')"></div>
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|5')"></div>
                <div class="slot-small" onclick="flashGlow(this, 'load_style|nude|6')"></div>
            </div></div>
        </div>
        
        <!-- Dresser -->
        <div id="dresser-f" class="folder">
            <!-- Add Pj's, Lounge, Swimwear buttons here using 'load_style|category|number' -->
            <div class="header" onclick="toggleSub('undies-sub', this)">Undies ▼</div>
            <div id="undies-sub" class="sub-content">
                <div class="cat-container"><div class="cat-row">Bra's</div><div class="slot-grid"><div class="slot-small" onclick="flashGlow(this, 'load_style|bras|1')"></div></div></div>
            </div>
            <button class="remove-btn" onclick="flashGlow(this, 'remove_last')">Remove Last Attachment</button>
        </div>
        
        <!-- Closet & Wardrobe categories follow the same pattern -->
    </div>
</div>

<script>
    const HUD_URL = "INSERT_YOUR_HUD_URL_HERE"; 

    function sendToHUD(command) {
        fetch(HUD_URL, {
            method: 'POST',
            body: 'SYNC:' + command
        });
    }

    function handleNavClick(id, btn) { 
        const folder = document.getElementById(id); 
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('glow-active')); 
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('show')); 
        btn.classList.add('glow-active'); 
        folder.classList.add('show'); 
    }
    
    function toggleSub(id, headerElement) { document.getElementById(id).classList.toggle('show'); }

    function flashGlow(btn, command) { 
        btn.classList.add('glow-active'); 
        if(command) sendToHUD(command);
        setTimeout(() => { btn.classList.remove('glow-active'); }, 1000); 
    }
</script>
</body>
</html>
