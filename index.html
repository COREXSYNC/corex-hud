<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body { 
            background: rgba(0,0,0,0.5); 
            backdrop-filter: blur(15px); 
            color: white; 
            font-family: sans-serif; 
            padding: 10px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.2); 
            /* Disable user selection for a 'pro' look */
            user-select: none; 
        }
        h2 { 
            font-size: 14px; 
            text-transform: uppercase; 
            text-align: center; 
            margin: 0 0 10px 0; 
            border-bottom: 1px solid #444; 
            padding-bottom: 5px; 
        }
        .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 5px; }
        /* Style the 'buttons' to look like UI elements without needing interactivity */
        .ui-box { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid rgba(255,255,255,0.2); 
            color: rgba(255,255,255,0.7); 
            padding: 8px; 
            font-size: 9px; 
            text-align: center;
        }
        .header-text { font-size: 11px; font-weight: bold; margin-bottom: 10px; color: #fff; }
    </style>
</head>
<body>

<div id="app">
    <h2>COREX // SYNC</h2>
    <div class="header-text">Current Selection:</div>
    
    <div class="grid">
        <div class="ui-box">SLOT 1</div>
        <div class="ui-box">SLOT 2</div>
        <div class="ui-box">SLOT 3</div>
        <div class="ui-box">SLOT 4</div>
        <div class="ui-box">SLOT 5</div>
        <div class="ui-box">SLOT 6</div>
    </div>
    
    <div style="margin-top:15px; font-size: 8px; color: #888; text-align: center;">
        COREX // SYSTEM READY
    </div>
</div>

</body>
</html>
