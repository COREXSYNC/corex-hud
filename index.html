<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        /* Base Reset */
        body {
            margin: 0;
            padding: 20px;
            background: transparent; /* Allows SL environment to show through */
            display: flex;
            justify-content: center;
        }

        /* Main Smoky Glass Container */
        .hud-container {
            background: rgba(20, 20, 20, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            color: #b0b0b0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 15px;
            width: 320px;
        }

        /* Two-Row Main Menu Layout */
        .menu-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
        }
        .menu-row:last-of-type {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
            margin-bottom: 15px;
        }

        /* Menu Buttons */
        .menu-btn {
            background: transparent;
            border: none;
            color: #b0b0b0;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .menu-btn:hover, .menu-btn.active {
            color: #E8E8E8;
            text-shadow: 0 0 8px rgba(232, 232, 232, 0.4);
        }

        /* Submenu Container */
        .submenu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* Category Item & Slots */
        .category {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .category-label {
            font-size: 13px;
            color: #E8E8E8;
        }
        .slot-group {
            display: flex;
            gap: 5px;
        }
        .style-slot {
            width: 18px;
            height: 18px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 3px;
            cursor: pointer;
            transition: 0.2s;
        }
        .style-slot:hover {
            background: rgba(232, 232, 232, 0.6);
        }

        /* Remove Item Action Button */
        .remove-btn {
            margin-top: 10px;
            background: rgba(200, 50, 50, 0.15);
            border: 1px solid rgba(200, 50, 50, 0.3);
            color: #ff7b7b;
            padding: 8px;
            border-radius: 4px;
            cursor: pointer;
            text-align: center;
            font-size: 12px;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.2s;
        }
        .remove-btn:hover {
            background: rgba(200, 50, 50, 0.3);
            color: #fff;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        
        <!-- MAIN MENU -->
        <!-- Row 1: Nude prioritized first -->
        <div class="menu-row">
            <button class="menu-btn active">Nude</button>
            <button class="menu-btn">Dresser</button>
            <button class="menu-btn">Closet</button>
        </div>
        <!-- Row 2: Alt prioritized last -->
        <div class="menu-row">
            <button class="menu-btn">Wardrobe</button>
            <button class="menu-btn">Minimize</button>
            <button class="menu-btn">Alt</button>
        </div>

        <!-- ACTIVE SUBMENU AREA -->
        <div class="submenu" id="active-menu-content">
            
            <!-- DRESSER ITEMS (Example view) -->
            <div class="category"><span class="category-label">Undies: Bra's</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Undies: Panties</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Undies: Boxers</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Undies: Briefs</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Undies: Lingerie</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Undies: Stocking & Socks</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Pj's</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Lounge</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>
            <div class="category"><span class="category-label">Swim</span>
                <div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div>
            </div>

            <!-- UNIVERSAL REMOVE BUTTON -->
            <button class="remove-btn">Remove Last Detach</button>
            
        </div>
    </div>

</body>
</html>
