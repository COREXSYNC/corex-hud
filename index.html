<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC</title>
    <style>
        body { margin: 0; background: url('closet.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; color: #fff; }
        .hud-container { width: 90%; margin: 20px auto; background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(20px); padding: 20px; border-radius: 10px; }
        .folder { margin-bottom: 5px; }
        .header { cursor: pointer; padding: 10px; background: rgba(255, 255, 255, 0.05); text-transform: uppercase; font-size: 18px; }
        .sub-content { padding: 5px 20px; display: none; }
        .sub-content.show { display: block; }
        .cat-container { display: flex; align-items: center; gap: 10px; margin: 5px 0; }
        .slot-small { width: 25px; height: 25px; background: #333; cursor: pointer; border: 1px solid #555; }
    </style>
</head>
<body>

<div class="hud-container">
    <h1>COREX // SYNC</h1>

    <!-- CLOSET FOLDER -->
    <div class="folder">
        <div class="header" onclick="toggle('closet-sub')">Closet ▼</div>
        <div id="closet-sub" class="sub-content">
            <div class="cat-container"><div>Dresses</div><div class="slot-small" onclick="sendToHUD('Dresses|1')"></div></div>
            <div class="cat-container"><div>Pants</div><div class="slot-small" onclick="sendToHUD('Pants|1')"></div></div>
            <div class="cat-container"><div>Shirts</div><div class="slot-small" onclick="sendToHUD('Shirts|1')"></div></div>
            <div class="cat-container"><div>Shorts</div><div class="slot-small" onclick="sendToHUD('Shorts|1')"></div></div>
            <div class="cat-container"><div>Skirts</div><div class="slot-small" onclick="sendToHUD('Skirts|1')"></div></div>
            <div class="cat-container"><div>Socks</div><div class="slot-small" onclick="sendToHUD('Socks|1')"></div></div>
            <div class="cat-container"><div>Stockings</div><div class="slot-small" onclick="sendToHUD('Stockings|1')"></div></div>
        </div>
    </div>

    <!-- DRESSER FOLDER -->
    <div class="folder">
        <div class="header" onclick="toggle('dresser-sub')">Dresser ▼</div>
        <div id="dresser-sub" class="sub-content">
            <div class="cat-container"><div>Lounge</div><div class="slot-small" onclick="sendToHUD('Lounge|1')"></div></div>
            <div class="cat-container"><div>Pj's</div><div class="slot-small" onclick="sendToHUD('Pj\'s|1')"></div></div>
            <div class="cat-container"><div>Swimwear</div><div class="slot-small" onclick="sendToHUD('Swimwear|1')"></div></div>
            <div class="cat-container"><div>Undies</div><div class="slot-small" onclick="sendToHUD('Undies|1')"></div></div>
        </div>
    </div>

    <!-- NUDE FOLDER -->
    <div class="folder">
        <div class="header" onclick="sendToHUD('Nude|1')">Nude</div>
    </div>

    <!-- WARDROBE FOLDER -->
    <div class="folder">
        <div class="header" onclick="toggle('wardrobe-sub')">Wardrobe ▼</div>
        <div id="wardrobe-sub" class="sub-content">
            <div class="cat-container"><div>Casual</div><div class="slot-small" onclick="sendToHUD('Casual|1')"></div></div>
            <div class="cat-container"><div>Club</div><div class="slot-small" onclick="sendToHUD('Club|1')"></div></div>
            <div class="cat-container"><div>Formal</div><div class="slot-small" onclick="sendToHUD('Formal|1')"></div></div>
            <div class="cat-container"><div>Roleplay</div><div class="slot-small" onclick="sendToHUD('Roleplay|1')"></div></div>
            <div class="cat-container"><div>Seasons</div><div class="slot-small" onclick="sendToHUD('Seasons|1')"></div></div>
            <div class="cat-container"><div>Shopping</div><div class="slot-small" onclick="sendToHUD('Shopping|1')"></div></div>
            <div class="cat-container"><div>Sleep</div><div class="slot-small" onclick="sendToHUD('Sleep|1')"></div></div>
        </div>
    </div>
</div>

<script>
    const HUD_URL = "INSERT_YOUR_HUD_URL_HERE"; 
    function toggle(id) { document.getElementById(id).classList.toggle('show'); }
    function sendToHUD(cmd) { fetch(HUD_URL, { method: 'POST', body: cmd }); }
</script>
</body>
</html>
