<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --glass: rgba(0, 0, 0, 0.7); --glow: 0 0 15px rgba(255, 255, 255, 0.6); }
        
        body, html { 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            font-family: 'Courier New', Courier, monospace; 
            color: #fff; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center;
        }

        .container { 
            width: 100%; height: 100%; 
            /* Replace 'your-image.jpg' with your actual filename */
            background-image: url('your-image.jpg'); 
            background-size: cover; 
            background-position: center;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }

        .overlay {
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            padding: 20px;
        }

        h1 { 
            font-size: 32px; letter-spacing: 6px; margin-bottom: 50px; text-transform: uppercase; font-weight: 300; cursor: pointer;
        }

        .menu-btn, .sub-btn, .nude-btn, .remove-hud-btn { 
            width: 300px; 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            color: #fff; padding: 20px; margin-bottom: 15px;
            text-transform: uppercase; letter-spacing: 2px;
            cursor: pointer; transition: 0.3s;
            border-radius: 2px;
        }

        .menu-btn:hover, .sub-btn:hover { background: rgba(255, 255, 255, 0.15); }
        
        /* The glow effect */
        .active-glow { border-color: #fff !important; box-shadow: var(--glow) !important; opacity: 1 !important; background: rgba(255,255,255,0.2) !important; }
        
        .slot-container { display: none; margin-bottom: 10px; }
        .slot-btn { width: 40px; height: 40px; background: rgba(0,0,0,0.3); color: #fff; border: 1px solid #555; cursor: pointer; margin: 2px; transition: 0.2s; }
        
        .content { display: none; }
        .controls { display: none; margin-top: 20px; }
        .ctrl-btn { background: none; border: 1px solid #777; color: #fff; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="overlay">
            <h1 onclick="showHome()">𝙲𝙾𝚁𝙴𝚇//𝚂𝚈𝙽𝙲</h1>
            
            <div id="home">
                <button class="menu-btn" onclick="showCategory('dresser')">Dresser</button>
                <button class="menu-btn" onclick="showCategory('closet')">Closet</button>
                <button class="menu-btn" onclick="showCategory('wardrobe')">Wardrobe</button>
                <button class="nude-btn" onclick="toggleOnlySlots(this)">Nude</button>
                <div class="slot-container">
                    <button class="slot-btn" onclick="send(this,'Nude','style1')">1</button>
                    <button class="slot-btn" onclick="send(this,'Nude','style2')">2</button>
                    <button class="slot-btn" onclick="send(this,'Nude','style3')">3</button>
                </div>
                <button class="nude-btn" onclick="send(this,'HUD','remove')">Remove HUD</button>
            </div>

            <div id="dresser" class="content"></div>
            <div id="closet" class="content"></div>
            <div id="wardrobe" class="content"></div>

            <div id="controls" class="controls">
                <button class="ctrl-btn" onclick="showHome()">Back</button>
            </div>
        </div>
    </div>

    <script>
        // Updated addCategory to pass "this" into the send function
        function addCategory(id, items) { 
            var container = document.getElementById(id); 
            items.forEach(function(item) { 
                var btn = document.createElement('button'); btn.className = 'sub-btn'; btn.innerText = item[0]; container.appendChild(btn); 
                if (item[2]) { 
                    var subDiv = document.createElement('div'); subDiv.className = 'submenu-items';
                    item[2].forEach(sub => { 
                        var subBtn = document.createElement('button'); subBtn.className = 'sub-btn'; subBtn.innerText = sub[0]; 
                        var slots = document.createElement('div'); slots.className = 'slot-container'; 
                        for(var i=1; i<=6; i++) slots.innerHTML += `<button class="slot-btn" onclick="send(this,'${sub[1]}','style${i}')">${i}</button>`;
                        subBtn.onclick = function() { toggleOnlySlots(this); }; 
                        subDiv.appendChild(subBtn); subDiv.appendChild(slots); 
                    }); 
                    btn.onclick = function() { toggleSubmenu(this, subDiv); };
                    container.appendChild(subDiv); 
                } else { 
                    btn.onclick = function() { toggleOnlySlots(this); }; 
                    var div = document.createElement('div'); div.className = 'slot-container'; 
                    for(var i=1; i<=6; i++) div.innerHTML += `<button class="slot-btn" onclick="send(this,'${item[1]}','style${i}')">${i}</button>`;
                    container.appendChild(div); 
                } 
            }); 
        }

        // Updated send function handles the glow logic
        function send(btn, part, style) { 
            // 1. Remove glow from all buttons in the current container
            var parent = btn.parentElement;
            parent.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('active-glow'));
            
            // 2. Add glow to clicked button
            btn.classList.add('active-glow');
            
            // 3. Send command
            var f = document.getElementById('sl_form'); 
            f.action = window.location.hash.substring(1); 
            document.getElementById('p_data').value = part + "," + style; 
            f.submit(); 
        }

        // ... (Keep existing showCategory, showHome, toggle functions) ...
        function showCategory(id) { document.getElementById('home').style.display='none'; document.getElementById(id).style.display='block'; document.getElementById('controls').style.display='block'; }
        function showHome() { document.getElementById('home').style.display='block'; document.querySelectorAll('.content').forEach(c => c.style.display='none'); document.getElementById('controls').style.display='none'; }
        function toggleOnlySlots(btn) { var s = btn.nextElementSibling; s.style.display = (s.style.display==='block')?'none':'block'; }
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
