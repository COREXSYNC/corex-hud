<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            background: linear-gradient(135deg, #1f1f1f 0%, #0a0a0a 100%);
            color: #E8E8E8;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
            height: 100vh;
            margin: 0;
            box-sizing: border-box;
        }
        .btn {
            background: #242424;
            color: #E8E8E8;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px 20px;
            margin: 6px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 600;
            cursor: pointer;
            width: 260px;
            font-size: 13px;
            display: block;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 20px;
            font-weight: 300;
            border-bottom: 1px solid #333;
            padding-bottom: 10px;
            width: 75%;
            text-align: center;
            color: #fff;
        }
    </style>
</head>
<body>
    <h2>Corex_Sync Wardrobe</h2>
    <form method='POST'>
        <!-- These buttons trigger the navigation or RLV commands -->
        <button class='btn' name='nav' value='outfits'>Outfits</button>
        <button class='btn' name='nav' value='sleepwear'>Sleepwear</button>
        <button class='btn' name='nav' value='extras'>Extras</button>
        <button class='btn' name='cmd' value='HUD,remove'>REMOVE HUD</button>
    </form>
</body>
</html>
