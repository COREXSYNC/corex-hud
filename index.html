<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX // SYNC</title>
    <style>
        body {
            background-color: rgba(30, 30, 30, 0.85); /* Charcoal smoked glass */
            color: #E8E8E8;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 10px;
            overflow: hidden; /* Prevents scrollbars in SL */
        }
        .header {
            text-align: center;
            font-size: 14px;
            letter-spacing: 2px;
            margin-bottom: 15px;
            border-bottom: 1px solid #E8E8E8;
            padding-bottom: 5px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }
        .btn {
            background: transparent;
            border: 1px solid #E8E8E8;
            color: #E8E8E8;
            padding: 12px 0;
            border-radius: 4px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #E8E8E8;
            color: #1e1e1e;
        }
    </style>
</head>
<body>

    <div class="header">COREX // SYNC</div>

    <div class="grid">
        <button class="btn">Base</button>
        <button class="btn">Casual</button>
        <button class="btn">Formal</button>
        <button class="btn">Club</button>
        <button class="btn">Lounge</button>
        <button class="btn">Alt</button>
        <button class="btn">Nude</button>
        <button class="btn">PJs</button>
    </div>

</body>
</html>
