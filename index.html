<!DOCTYPE html>
<html>
<head>
    <style>
        .slot { width: 100px; padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <button id="slot1" class="slot" onclick="updateItem(1)">Empty</button>
    <button id="slot2" class="slot" onclick="updateItem(2)">Empty</button>
    <!-- ... repeat for 6 slots ... -->

    <script>
        // In SL, you usually update the UI by having the LSL script 
        // refresh the page or by using a WebSocket/polling mechanism.
        // For buttons, you use location.href to send commands to LSL.
        function updateItem(slotIndex) {
            // This URL structure is a common way to trigger LSL-side scripts 
            // via the Second Life protocol.
            window.location.href = "secondlife:///app/chat/1000/COREX_COMMAND_" + slotIndex;
        }
    </script>
</body>
</html>
