<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* ... keep your existing .hud-container, .btn, .style-slot styles ... */

        /* Dropdown Structure */
        .dropdown-container { margin-top: 10px; }
        .dropdown-header {
            background: rgba(255, 255, 255, 0.1);
            color: #E8E8E8;
            padding: 10px;
            cursor: pointer;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
        }
        .dropdown-content {
            display: none; /* Hidden by default */
            padding: 10px;
            background: rgba(0, 0, 0, 0.2);
        }
        .dropdown-content.show { display: block; }
    </style>
</head>
<body>
    <div class="hud-container">
        <!-- DRESSER FOLDER -->
        <div class="dropdown-container">
            <div class="dropdown-header" onclick="toggleDropdown('dresser-list')">
                Dresser <span>▼</span>
            </div>
            <div id="dresser-list" class="dropdown-content">
                <!-- Sub-dropdown for Undies -->
                <div class="dropdown-header" onclick="toggleDropdown('undies-list')">Undies <span>▼</span></div>
                <div id="undies-list" class="dropdown-content">
                    <div class="category"><span class="category-label">Bra's</span>...</div>
                    <div class="category"><span class="category-label">Panties</span>...</div>
                </div>
                <!-- Other Dresser Items -->
                <div class="category"><span class="category-label">Pj's</span>...</div>
                <button class="remove-btn">Remove</button>
            </div>
        </div>
    </div>

    <script>
        function toggleDropdown(id) {
            document.getElementById(id).classList.toggle('show');
        }
    </script>
</body>
</html>
