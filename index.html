<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100vh;
            background: url('closet.jpg') no-repeat center center !important; 
            background-size: cover !important;
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
            color: #ffffff;
        }

        .hud-container { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(147, 109, 65, 0.45); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.2); 
            border-radius: 8px; 
            padding: 30px; 
            width: 85%; height: 85%;
            overflow-y: auto;
            display: flex; flex-direction: column;
        }

        .hud-container::-webkit-scrollbar { display: none; }

        .nav-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .nav-btn { 
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); 
            color: #ffffff; padding: 20px; flex: 1; text-transform: uppercase; 
            font-weight: bold; cursor: pointer;
        }
        .nav-btn.glow-active { border: 2px solid #00ff00; box-shadow: 0 0 15px #00ff00; }
        
        .folder { margin-top: 15px; display: none; }
        .folder.show { display: block; }
        
        .header { background: rgba(255, 255, 255, 0.1); padding: 15px; cursor: pointer; margin-top: 5px; font-weight: bold; }
        .sub-content { display: none; padding-left: 20px; }
        .sub-content.show { display: block; }
        
        .cat-row { padding: 10px 0; cursor: pointer; border-bottom: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: space-between; }
        
        .style-slots { display: none; padding: 10px; background: rgba(0,0,0,0.2); margin-top: 5px; gap: 5px; }
        .style-slots.active { display: flex; }

        .rect-btn { width: 30px; height: 25px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        .remove-btn { margin-top: 20px; background: rgba(180, 60, 60, 0.3); border: 1px solid rgba(255, 255, 255, 0.2); color: #ffffff; padding: 15px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('nude-f', this)">Nude</button>
            <button class="nav-btn" onclick="toggleFolder('dresser-f', this)">Dresser</button>
            <button class="nav-btn" onclick="toggleFolder('closet-f', this)">Closet</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('wardrobe-f', this)">Wardrobe</button>
            <button class="nav-btn" onclick="toggleGlow(this)">Minimize</button>
        </div>

        <div id="nude-f" class="folder">
            <div class="cat-row" onclick="moveSlots(this)"><span>Nude Style</span><div class="slots-box"><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button></div></div>
        </div>

        <div id="dresser-f" class="folder">
            <div class="header" onclick="toggleSub('undies-sub')">Undies ▼</div>
            <div id="undies-sub" class="sub-content">
                <div class="cat-row" onclick="moveSlots(this)">Bra's</div>
                <div class="cat-row" onclick="moveSlots(this)">Panties</div>
                <div class="cat-row" onclick="moveSlots(this)">Boxers</div>
                <div class="cat-row" onclick="moveSlots(this)">Briefs</div>
                <div class="cat-row" onclick="moveSlots(this)">Lingerie</div>
                <div class="cat-row" onclick="moveSlots(this)">Stocking/Socks</div>
            </div>
            <div class="cat-row" onclick="moveSlots(this)">Pj's</div>
            <div class="cat-row" onclick="moveSlots(this)">Lounge</div>
            <div class="cat-row" onclick="moveSlots(this)">Swim</div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>

        <div id="closet-f" class="folder">
            <div class="cat-row" onclick="moveSlots(this)">Dresses</div>
            <div class="header" onclick="toggleSub('shirts-sub')">Shirts ▼</div>
            <div id="shirts-sub" class="sub-content">
                <div class="cat-row" onclick="moveSlots(this)">Long Sleeve</div>
                <div class="cat-row" onclick="moveSlots(this)">Short Sleeve</div>
                <div class="cat-row" onclick="moveSlots(this)">Tanks</div>
            </div>
            <div class="cat-row" onclick="moveSlots(this)">Pants</div>
            <div class="cat-row" onclick="moveSlots(this)">Skirts</div>
            <div class="cat-row" onclick="moveSlots(this)">Shorts</div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>

        <div id="wardrobe-f" class="folder">
            <div class="cat-row" onclick="moveSlots(this)">Casual</div>
            <div class="cat-row" onclick="moveSlots(this)">Club</div>
            <div class="cat-row" onclick="moveSlots(this)">Formal</div>
            <div class="cat-row" onclick="moveSlots(this)">Sleep</div>
            <div class="cat-row" onclick="moveSlots(this)">Roleplay</div>
            <div class="cat-row" onclick="moveSlots(this)">Shopping</div>
            <div class="cat-row" onclick="moveSlots(this)">Swimwear</div>
            <div class="header" onclick="toggleSub('seasons-sub')">Seasons ▼</div>
            <div id="seasons-sub" class="sub-content">
                <div class="cat-row" onclick="moveSlots(this)">Spring</div>
                <div class="cat-row" onclick="moveSlots(this)">Summer</div>
                <div class="cat-row" onclick="moveSlots(this)">Winter</div>
                <div class="cat-row" onclick="moveSlots(this)">Autumn</div>
            </div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
    </div>

    <div id="style-slots-area" class="style-slots">
        <button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button><button class="rect-btn"></button>
    </div>

    <script>
        function toggleFolder(id, btn) {
            document.getElementById(id).classList.toggle('show');
            toggleGlow(btn);
        }
        function toggleGlow(btn) { btn.classList.toggle('glow-active'); }
        function toggleSub(id) { document.getElementById(id).classList.toggle('show'); }
        function moveSlots(element) {
            const slots = document.getElementById('style-slots-area');
            element.after(slots);
            slots.classList.add('active');
        }
    </script>
</body>
</html>
