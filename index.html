<script>
        window.onload = function() {
            addCategory('dresser', [
                ["Lounge", "Dresser/Lounge"], ["Pj's", "Dresser/Pj's"], ["Swimwear", "Dresser/Swimwear"],
                ["Undies", null, [["Bra's", "Dresser/Undies/Bra's"], ["Panties", "Dresser/Undies/Panties"], ["Boxer/Briefs", "Dresser/Undies/BoxerBriefs"], ["Lingerie", "Dresser/Undies/Lingerie"], ["Stockings", "Dresser/Undies/Stockings"], ["Socks", "Dresser/Undies/Socks"]]]
            ]);
            addCategory('closet', [
                ["Skirts", "Closet/Skirts"], ["Shorts", "Closet/Shorts"], ["Sweaters", "Closet/Sweaters"],
                ["Dresses", null, [["Long", "Closet/Dresses/Long"], ["Short", "Closet/Dresses/Short"]]],
                ["Shirts", null, [["Dress Shirts", "Closet/Shirts/DressShirts"], ["Long Sleeve", "Closet/Shirts/LongSleeve"], ["Short Sleeve", "Closet/Shirts/ShortSleeve"], ["Tanks/T's", "Closet/Shirts/TanksTs"], ["Tube Tops", "Closet/Shirts/TubeTops"]]],
                ["Pants", null, [["Slacks", "Closet/Pants/DressPants"], ["Casual", "Closet/Pants/Casual"], ["Jeans", "Closet/Pants/Jeans"], ["Leggings", "Closet/Pants/Leggings"]]]
            ]);
            addCategory('wardrobe', [
                ["Casual", "Wardrobe/Casual"], ["Club", "Wardrobe/Club"], ["Shopping", "Wardrobe/Shopping"],
                ["Sleep", "Wardrobe/Sleep"], ["Roleplay", "Wardrobe/Roleplay"],
                ["Formal", null, [["Gowns", "Wardrobe/Formal/Gowns"], ["Suits", "Wardrobe/Formal/Suits"]]],
                ["Seasons", null, [["Spring", "Wardrobe/Seasons/Spring"], ["Summer", "Wardrobe/Seasons/Summer"], ["Fall", "Wardrobe/Seasons/Fall"], ["Winter", "Wardrobe/Seasons/Winter"]]]
            ]);
        };

        function addCategory(id, items) { 
            var container = document.getElementById(id); 
            items.forEach(function(item) { 
                var btn = document.createElement('button'); 
                btn.className = 'sub-btn'; btn.innerText = item[0]; 
                container.appendChild(btn); 
                
                if (item[2]) { // Submenu
                    btn.onclick = function() { toggleSubmenu(this); }; 
                    var subDiv = document.createElement('div'); subDiv.className = 'submenu-items'; subDiv.style.display = 'none';
                    item[2].forEach(sub => { 
                        var subBtn = document.createElement('button'); subBtn.className = 'sub-btn'; subBtn.innerText = sub[0]; 
                        var slots = document.createElement('div'); slots.className = 'slot-container'; 
                        for(var i=1; i<=6; i++) slots.innerHTML += `<button class="slot-btn" onclick="send('${sub[1]}','style${i}')">${i}</button>`;
                        subBtn.onclick = function() { toggleOnlySlots(this.nextElementSibling); }; 
                        subDiv.appendChild(subBtn); subDiv.appendChild(slots); 
                    }); 
                    container.appendChild(subDiv); 
                } else { // Direct items
                    btn.onclick = function() { toggleOnlySlots(this.nextElementSibling); }; 
                    var div = document.createElement('div'); div.className = 'slot-container'; 
                    for(var i=1; i<=6; i++) div.innerHTML += `<button class="slot-btn" onclick="send('${item[1]}','style${i}')">${i}</button>`;
                    container.appendChild(div); 
                } 
            }); 
        }

        // Only shows the slots for the button clicked, closes others
        function toggleOnlySlots(el) {
            var parent = el.parentElement;
            var allSlots = parent.querySelectorAll('.slot-container');
            allSlots.forEach(s => { if(s !== el) s.style.display = 'none'; });
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function toggleSubmenu(btn) {
            var sub = btn.nextElementSibling;
            sub.style.display = (sub.style.display === 'block') ? 'none' : 'block';
        }

        function showCategory(id) { document.getElementById('home').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
        function showHome() { 
            var contents = document.getElementsByClassName('content'); 
            for(var i=0; i<contents.length; i++) { contents[i].style.display = 'none'; } 
            document.getElementById('home').style.display = 'block'; 
        }
        function send(part, style) { var f = document.getElementById('sl_form'); f.action = window.location.hash.substring(1); document.getElementById('p_data').value = part + "," + style; f.submit(); }
    </script>
