<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; justify-content: center; background: transparent; }
        .hud-container {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #E8E8E8;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            width: 360px;
        }
        .menu-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #E8E8E8;
            padding: 12px;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }
        .btn.active { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
        
        .submenu { display: none; flex-direction: column; gap: 8px; margin-top: 15px; }
        .submenu.active { display: flex; }
        
        .category { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .category-label { font-size: 14px; }
        .slot-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .style-slot {
            width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
        }
        .remove-btn {
            margin-top: 15px;
            background: rgba(200, 50, 50, 0.2);
            border: 1px solid rgba(200, 50, 50, 0.4);
            color: #ff9999;
            padding: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="hud-container">
        <!-- FOLDER TABS -->
        <div class="menu-row">
            <button class="btn" onclick="showFolder('nude')">Nude</button>
            <button class="btn" onclick="showFolder('dresser')">Dresser</button>
            <button class="btn" onclick="showFolder('closet')">Closet</button>
        </div>
        <div class="menu-row">
            <button class="btn" onclick="showFolder('wardrobe')">Wardrobe</button>
            <button class="btn">Minimize</button>
            <button class="btn">Alt</button>
        </div>

        <!-- DRESSER FOLDER -->
        <div id="dresser" class="submenu">
            <div class="category"><span class="category-label">Bra's</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <!-- Add other items here -->
            <button class="remove-btn">Remove Last Detach</button>
        </div>

        <!-- CLOSET FOLDER -->
        <div id="closet" class="submenu">
            <div class="category"><span class="category-label">Dresses</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <button class="remove-btn">Remove Last Detach</button>
        </div>
    </div>

    <script>
        function showFolder(folderId) {
            document.querySelectorAll('.submenu').forEach(f => f.classList.remove('active'));
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
            document.getElementById(folderId).classList.add('active');
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
