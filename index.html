<script>
    function handleNavClick(id, btn) {
        const folder = document.getElementById(id);
        const isCurrentlyActive = btn.classList.contains('glow-active');

        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('glow-active'));
        document.querySelectorAll('.folder').forEach(f => f.classList.remove('show'));
        
        if (!isCurrentlyActive) {
            btn.classList.add('glow-active');
            folder.classList.add('show');
        }
    }

    // Updated toggleSub to also handle the glow for submenu headers
    function toggleSub(id, headerElement) { 
        document.getElementById(id).classList.toggle('show'); 
        toggleGlow(headerElement);
    }

    function toggleGlow(btn) { 
        btn.classList.toggle('glow-active'); 
    }
</script>
