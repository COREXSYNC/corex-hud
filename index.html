<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC</title>
    <style>
        /* COREX // SYNC Minimalist Style */
        body { margin: 0; background: url('closet.jpg') no-repeat center center fixed; background-size: cover; font-family: 'Montserrat', sans-serif; color: #fff; }
        .hud-container { width: 80%; margin: 50px auto; background: rgba(30, 30, 30, 0.4); backdrop-filter: blur(20px); padding: 20px; border-radius: 10px; }
        .folder { margin-bottom: 20px; }
        .header { cursor: pointer; padding: 10px; background: rgba(255, 255, 255, 0.1); font-weight: 300; text-transform: uppercase; letter-spacing: 2px; }
        .sub-content { padding: 10px 20px; }
        .cat-container { display: flex; align-items: center; gap: 15px; margin: 8px 0; }
        .slot-small { width: 30px; height: 30px; background: rgba(255, 255, 255, 0.1); border: 1px solid #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="hud-container">
    <h1>COREX // SYNC</h1>
    
    <!-- DRESSER -->
    <div class="folder">
        <div class="header">Undies ▼</div>
        <div class="sub-content">
            <div class="cat-container">
                <div>Bra's</div>
                <div class="slot-small" onclick="sendToHUD('bras|1')"></div>
                <div class="slot-small" onclick="sendToHUD('bras|2')"></div>
            </div>
            <div class="cat-container">
                <div>Panties</div>
                <div class="slot-small" onclick="sendToHUD('panties|1')"></div>
            </div>
        </div>
    </div>

    <!-- CLOSET -->
    <div class="folder">
        <div class="header">Shirts ▼</div>
        <div class="sub-content">
            <div class="cat-container">
                <div>Long Sleeve</div>
                <div class="slot-small" onclick="sendToHUD('longsleeve|1')"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // UPDATE THIS URL AFTER EVERY RE-REZ
    const HUD_URL = "INSERT_YOUR_HUD_URL_HERE"; 

    function sendToHUD(command) {
        fetch(HUD_URL, { method: 'POST', body: command });
    }
</script>
</body>
</html>
