<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        :root { --glass: rgba(0, 0, 0, 0.7); --glow: 0 0 15px rgba(255, 255, 255, 0.6); }
        body { margin: 0; padding: 40px; font-family: 'Segoe UI', sans-serif; color: #fff; 
               background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://i.imgur.com/eBw0k7t.jpeg'); 
               background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; }
        .container { position: relative; z-index: 1; max-width: 800px; margin: 2% auto; background: rgba(0, 0, 0, 0.5); padding: 30px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15); }
        h1 { font-size: 20px; text-align: center; color: #fff; letter-spacing: 6px; text-transform: uppercase; margin-bottom: 35px; text-shadow: 0 3px 6px rgba(0,0,0,0.7); cursor: pointer; }
        .menu-btn { width: 100%; background: var(--glass); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; padding: 20px; margin-bottom: 12px; text-transform: uppercase; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 6px; }
        .sub-btn { width: 100%; background: rgba(255,255,255,0.1); border: 1px solid #555; color: #fff; padding: 15px; margin-bottom: 5px; font-size: 12px; cursor: pointer; text-transform: uppercase; }
        .slot-container { display: none; padding: 10px; text-align: center; }
        .slot-btn { width: 45px; height: 35px; font-size: 12px; background: rgba(0,0,0,0.6); color: #fff; border: 1px solid #777; cursor: pointer; margin: 3px; }
        .slot-btn:hover { border-color: #fff; box-shadow: var(--glow); }
        .content { display: none; }
        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; }
        .ctrl-btn { background: rgba(0,0,0,0.7); border: 1px solid #666; color: #fff; padding: 18px; font-size: 12px; cursor: pointer; border-radius: 4px; text-transform: uppercase; }
        .nude-btn { width: 100%; background: #500; border: 1px solid #900; color: #fff; padding: 15px; margin-top: 15px; text-transform: uppercase; font-size: 13px; font-weight: bold; cursor: pointer; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="container">
        <h1 onclick="location.reload()">COREX_SYNC</h1>
        <div id="home">
            <button class="menu-btn" onclick="showCategory('dresser')">Dresser</button>
            <button class="menu-btn" onclick="showCategory('closet')">Closet</button>
            <button class="menu-btn" onclick="showCategory('wardrobe')">Wardrobe</button>
        </div>
        <div id="dresser" class="content"></div>
        <div id="closet" class="content"></div>
        <div id="wardrobe" class="content">
            <button class="nude-btn" onclick="send('Nude','remove')">Nude</button>
        </div>
        <div id="controls" class="controls">
            <button class="ctrl-btn" onclick="location.reload()">Back to Home</button>
            <button class="ctrl-btn" onclick="send('RemoveLast','detach')">Remove Last Item</button>
        </div>
    </div>
    <script>
        window.onload = function() {
            // Updated structure: [Category Name, null, [Sub-options Array]]
            addCategory('dresser', [
                ["Lounge", "Dresser/Lounge"], ["Pj's", "Dresser/Pj's"], ["Swimwear", "Dresser/Swimwear"],
                ["Undies", "submenu", [["Bra's", "Dresser/Undies/Bra's"], ["Panties", "Dresser/Undies/Panties"], ["Boxer/Briefs", "Dresser/Undies/BoxerBriefs"], ["Lingerie", "Dresser/Undies/Lingerie"], ["Stockings", "Dresser/Undies/Stockings"], ["Socks", "Dresser/Undies/Socks"]]]
            ]);
            addCategory('closet', [
                ["Skirts", "Closet/Skirts"], ["Shorts", "Closet/Shorts"], ["Sweaters", "Closet/Sweaters"],
                ["Dresses", "submenu", [["Long", "Closet/Dresses/Long"], ["Short", "Closet/Dresses/Short"]]],
                ["Shirts", "submenu", [["Dress Shirts", "Closet/Shirts/DressShirts"], ["Long Sleeve", "Closet/Shirts/LongSleeve"], ["Short Sleeve", "Closet/Shirts/ShortSleeve"], ["Tanks/T's", "Closet/Shirts/TanksTs"], ["Tube Tops", "Closet/Shirts/TubeTops"]]],
                ["Pants", "submenu", [["Slacks", "Closet/Pants/DressPants"], ["Casual", "Closet/Pants/Casual"], ["Jeans", "Closet/Pants/Jeans"], ["Leggings", "Closet/Pants/Leggings"]]]
            ]);
            addCategory('wardrobe', [
                ["Casual", "Wardrobe/Casual"], ["Club", "Wardrobe/Club"], ["Shopping", "Wardrobe/Shopping"],
                ["Sleep", "Wardrobe/Sleep"], ["Roleplay", "Wardrobe/Roleplay"],
                ["Formal", "submenu", [["Gowns", "Wardrobe/Formal/Gowns"], ["Suits", "Wardrobe/Formal/Suits"]]],
                ["Seasons", "submenu", [["Spring", "Wardrobe/Seasons/Spring"], ["Summer", "Wardrobe/Seasons/Summer"], ["Fall", "Wardrobe/Seasons/Fall"], ["Winter", "Wardrobe/Seasons/Winter"]]]
            ]);
        };
        function addCategory(id, items) { 
            var container = document.getElementById(id); 
            items.forEach(function(item) { 
                if (item[1] === "submenu") {
                    var subDiv = document.createElement('div');
                    item[2].forEach(sub => {
                        var btn = document.createElement('button'); btn.className = 'sub-btn'; btn.innerText = sub[0];
                        var slots = document.createElement('div'); slots.className = 'slot-container';
                        for(var i=1; i<=6; i++) slots.innerHTML += `<button class="slot-btn" onclick="send('${sub[1]}','style${i}')">${i}</button>`;
                        btn.onclick = function() { toggleOnlySlots(this); };
                        subDiv.appendChild(btn); subDiv.appendChild(slots);
                    });
                    container.appendChild(subDiv);
                } else {
                    var btn = document.createElement('button'); btn.className = 'sub-btn'; btn.innerText = item[0];
                    var slots = document.createElement('div'); slots.className = 'slot-container';
                    for(var i=1; i<=6; i++) slots.innerHTML += `<button class="slot-btn" onclick="send('${item[1]}','style${i}')">${i}</button>`;
                    btn.onclick = function() { toggleOnlySlots(this); };
                    container.appendChild(btn); container.appendChild(slots);
                }
            }); 
        }
        function toggleOnlySlots(btn) {
            var parent = btn.parentElement;
            parent.querySelectorAll('.slot-container').forEach(s => { if(s !== btn.nextElementSibling) s.style.display = 'none'; });
            var slots = btn.nextElementSibling;
            slots.style.display = (slots.style.display === 'block') ? 'none' : 'block';
        }
        function showCategory(id) { document.getElementById('home').style.display = 'none'; document.getElementById(id).style.display = 'block'; }
        function send(part, style) { var f = document.getElementById('sl_form'); f.action = window.location.hash.substring(1); document.getElementById('p_data').value = part + "," + style; f.submit(); }
    </script>
    <iframe name="secret_frame" style="display:none;"></iframe>
    <form id="sl_form" method="POST" target="secret_frame" style="display:none;"><input type="hidden" id="p_data" name="cmd"></form>
</body>
</html>
