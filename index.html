<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COREX // SYNC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Forces the HTML to take up the full screen to eliminate the grey box */
        html, body {
            min-height: 100vh;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-image: url('https://raw.githubusercontent.com/hypnotic087-commits/corex-hud/main/closet.jpg'); 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed; /* Locks the background so it never cuts off */
            
            background-color: rgba(15, 15, 15, 0.75); 
            background-blend-mode: overlay;
            backdrop-filter: blur(2px);
            
            color: #ffffff;
            font-family: 'Segoe UI Light', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            padding: 20px;
            overflow-x: hidden; 
        }
        
        .header {
            text-align: center;
            font-size: 34px; /* Increased Font Size */
            font-weight: 300; 
            letter-spacing: 6px;
            margin-bottom: 25px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 15px;
            text-transform: uppercase;
        }

        /* 3-Column Grid to force 6 items into exactly two rows */
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr; 
            gap: 15px; 
            align-items: start; 
        }
        
        .category-container {
            width: 100%;
        }

        /* MAIN BUTTONS */
        .btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.05); 
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.4); 
            color: #ffffff;
            padding: 20px 0; 
            border-radius: 0px; 
            font-size: 20px; /* Increased Font Size */
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn i {
            margin-right: 12px;
            font-size: 20px; /* Increased Icon Size */
        }
        
        .btn:hover {
            background: rgba(220, 220, 220, 0.9);
            color: #1a1a1a;
            border-color: rgba(220, 220, 220, 0.9);
        }

        /* SUB-MENUS */
        .submenu {
            display: none; 
            flex-direction: column;
            gap: 10px;
            padding: 12px 0 0 0; 
        }

        .sub-btn {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.25);
            color: #cccccc;
            padding: 16px 0; 
            border-radius: 0px; 
            font-size: 17px; /* Increased Font Size */
            font-weight: 300;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.2s;
            width: 100%;
        }
        .sub-btn:hover {
            background: rgba(220, 220, 220, 0.9);
            color: #1a1a1a;
            border-color: rgba(220, 220, 220, 0.9);
        }

        .remove-btn {
            color: #ff8888;
            border-color: rgba(255, 136, 136, 0.4);
            margin-top: 5px;
        }
        .remove-btn:hover {
            background: rgba(255, 100, 100, 0.9);
            color: #ffffff;
            border-color: rgba(255, 100, 100, 0.9);
        }

        .minimize-container {
            margin-top: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        .btn-minimize {
            width: 50%; 
            font-size: 18px; 
            padding: 18px 0; 
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div class="header">COREX // SYNC</div>

    <div class="grid">
        
        <!-- NUDE -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('nude-menu')"><i class="fa-solid fa-user"></i> Nude</button>
            <div id="nude-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Nude', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Nude', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Nude', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Nude', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- DRESSER -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('dresser-menu')"><i class="fa-solid fa-box-archive"></i> Dresser</button>
            <div id="dresser-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Dresser', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- CLOSET -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('closet-menu')"><i class="fa-solid fa-door-closed"></i> Closet</button>
            <div id="closet-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Closet', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Closet', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- WARDROBE -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('wardrobe-menu')"><i class="fa-solid fa-shirt"></i> Wardrobe</button>
            <div id="wardrobe-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Wardrobe', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- SHOE RACK -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('shoe-menu')"><i class="fa-solid fa-shoe-prints"></i> Shoe Rack</button>
            <div id="shoe-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Shoe Rack', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

        <!-- ALT -->
        <div class="category-container">
            <button class="btn" onclick="toggleMenu('alt-menu')"><i class="fa-solid fa-masks-theater"></i> Alt</button>
            <div id="alt-menu" class="submenu main-submenu">
                <button class="sub-btn" onclick="sendToSL('Alt', 'Style1')">Style 1</button>
                <button class="sub-btn" onclick="sendToSL('Alt', 'Style2')">Style 2</button>
                <button class="sub-btn" onclick="sendToSL('Alt', 'Style3')">Style 3</button>
                <button class="sub-btn" onclick="sendToSL('Alt', 'Style4')">Style 4</button>
                <button class="sub-btn remove-btn" onclick="sendToSL('System', 'RemoveLast')">Remove</button>
            </div>
        </div>

    </div>
    
    <!-- MINIMIZE (Separated from the grid to span across the bottom neatly) -->
    <div class="minimize-container">
        <button class="btn btn-minimize" onclick="sendToSL('System', 'Minimize')"><i class="fa-solid fa-compress"></i> Minimize</button>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const slurl = urlParams.get('slurl');

        function toggleMenu(menuId) {
            let allMenus = document.querySelectorAll('.main-submenu');
            allMenus.forEach(menu => {
                if (menu.id !== menuId) {
                    menu.style.display = 'none';
                }
            });

            let selectedMenu = document.getElementById(menuId);
            if (selectedMenu.style.display === 'flex') {
                selectedMenu.style.display = 'none';
            } else {
                selectedMenu.style.display = 'flex';
            }
        }

        function sendToSL(category, slot) {
            let outfitPath = category + "/" + slot;
            
            if (slurl) {
                fetch(slurl, {
                    method: 'POST',
                    body: outfitPath
                }).catch(error => {
                    console.error("Transmission Error:", error);
                });
            } else {
                console.log("No SL connection. Sent command:", outfitPath);
            }
        }
    </script>

</body>
</html>
