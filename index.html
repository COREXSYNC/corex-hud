<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        body { margin: 0; padding: 20px; display: flex; justify-content: center; background: transparent; }
        .hud-container {
            background: rgba(20, 20, 20, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            color: #E8E8E8;
            font-family: 'Segoe UI', sans-serif;
            padding: 15px;
            width: 380px;
        }

        /* Main Nav Buttons */
        .nav-row { display: flex; gap: 5px; margin-bottom: 10px; }
        .nav-btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #E8E8E8;
            padding: 12px;
            flex: 1;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 11px;
            cursor: pointer;
        }

        /* Dropdown System */
        .folder { margin-top: 5px; }
        .header {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 10px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 12px;
            display: flex;
            justify-content: space-between;
        }
        .content { display: none; padding: 5px 0 5px 15px; }
        .show { display: block; }

        /* Items */
        .category { display: flex; align-items: center; justify-content: space-between; padding: 5px 0; }
        .slot-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 3px; }
        .style-slot { width: 18px; height: 18px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        
        .remove-btn { margin-top: 10px; background: rgba(200, 50, 50, 0.2); border: 1px solid rgba(200, 50, 50, 0.4); color: #ff9999; padding: 8px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

<div class="hud-container">
    <div class="nav-row">
        <button class="nav-btn">Nude</button>
        <button class="nav-btn" onclick="toggle('dresser-f')">Dresser</button>
        <button class="nav-btn" onclick="toggle('closet-f')">Closet</button>
    </div>
    <div class="nav-row">
        <button class="nav-btn" onclick="toggle('wardrobe-f')">Wardrobe</button>
        <button class="nav-btn">Minimize</button>
        <button class="nav-btn">Alt</button>
    </div>

    <div id="dresser-f" class="folder content">
        <div class="header" onclick="toggle('undies-f')">Undies ▼</div>
        <div id="undies-f" class="content">
            <div class="category"><span>Bra's</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span>Panties</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
        </div>
        <div class="category"><span>Pj's</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
        <button class="remove-btn">Remove Last Detach</button>
    </div>

    <div id="closet-f" class="folder content">
        <div class="category"><span>Dresses</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
        <button class="remove-btn">Remove Last Detach</button>
    </div>
</div>

<script>
    function toggle(id) { document.getElementById(id).classList.toggle('show'); }
</script>

</body>
</html>
