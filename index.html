<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        /* Base Reset & Background */
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            background-color: transparent;
        }

        /* Main Container */
        .hud-container {
            background: rgba(20, 20, 20, 0.75);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            color: #E8E8E8;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            padding: 20px;
            width: 360px;
        }

        /* Two-Row Main Menu */
        .menu-row {
            display: flex;
            gap: 5px;
            margin-bottom: 10px;
        }

        /* Rectangular Buttons (Category & Menu) */
        .btn {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #E8E8E8;
            padding: 12px;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: bold;
            font-size: 13px;
            cursor: pointer;
            flex: 1;
            transition: 0.2s;
        }
        .btn:hover, .btn.active {
            background: rgba(255, 255, 255, 0.25);
        }

        /* Submenu Layout */
        .submenu { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
        .hidden { display: none; }

        /* Category Item Grid */
        .category { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
        .category-label { flex: 1; font-size: 14px; }
        
        .slot-group { display: grid; grid-template-columns: repeat(6, 1fr); gap: 4px; }
        .style-slot {
            width: 20px; height: 20px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            cursor: pointer;
        }
        .style-slot:hover { background: rgba(255, 255, 255, 0.25); }

        /* Remove Button */
        .remove-btn {
            margin-top: 15px;
            background: rgba(200, 50, 50, 0.2);
            border: 1px solid rgba(200, 50, 50, 0.4);
            color: #ff9999;
            padding: 10px;
            width: 100%;
            border-radius: 2px;
            text-transform: uppercase;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="hud-container">
        <!-- MAIN MENU -->
        <div class="menu-row">
            <button class="btn active">Nude</button>
            <button class="btn">Dresser</button>
            <button class="btn">Closet</button>
        </div>
        <div class="menu-row">
            <button class="btn">Wardrobe</button>
            <button class="btn">Minimize</button>
            <button class="btn">Alt</button>
        </div>

        <!-- DRESSER SUBMENU -->
        <div class="submenu" id="menu-dresser">
            <div class="category"><span class="category-label">Bra's</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Panties</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Boxers</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Briefs</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Lingerie</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Socks</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Pj's</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Lounge</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <div class="category"><span class="category-label">Swim</span><div class="slot-group"><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div><div class="style-slot"></div></div></div>
            <button class="remove-btn">Remove Last Detach</button>
        </div>
    </div>

    <script>
        // Tab switching logic
        document.querySelectorAll('.btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });
    </script>
</body>
</html>
