<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>COREX // SYNC UI</title>
    <style>
        html, body { 
            margin: 0; padding: 0; 
            width: 100%; height: 100vh;
            background: url('closet.jpg') no-repeat center center !important; 
            background-size: cover !important;
            font-family: 'Segoe UI', sans-serif; 
            overflow: hidden;
        }

        .hud-container { 
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(40, 40, 40, 0.75); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            border-radius: 8px; 
            padding: 40px; 
            width: 80%; height: 80%;
            overflow-y: auto; color: #E8E8E8; 
            display: flex; flex-direction: column;
        }

        .hud-container::-webkit-scrollbar { display: none; }

        .nav-row { display: flex; gap: 15px; margin-bottom: 25px; }
        .nav-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: #E8E8E8; padding: 25px; flex: 1; text-transform: uppercase; font-weight: bold; font-size: 16px; cursor: pointer; }
        .nav-btn.active { background: rgba(255, 255, 255, 0.3); border-color: #fff; }
        
        .folder { margin-top: 10px; display: none; }
        .folder.show { display: block; }
        
        /* Each category row */
        .category-item { margin-bottom: 5px; }
        .header { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 15px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 16px; display: flex; justify-content: space-between; }
        
        /* The sub-content that opens directly under the header */
        .sub-content { display: none; padding: 10px 0 10px 20px; background: rgba(0,0,0,0.1); }
        .sub-content.show { display: block; }
        
        .slot-row { display: flex; align-items: center; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .slot-group { display: flex; gap: 8px; }
        .style-btn { width: 30px; height: 30px; background: rgba(255, 255, 255, 0.08); border: 1px solid rgba(255, 255, 255, 0.2); cursor: pointer; }
        
        .remove-btn { margin-top: 25px; background: rgba(180, 60, 60, 0.4); border: 1px solid rgba(200, 50, 50, 0.4); color: #ffcccc; padding: 15px; width: 100%; text-transform: uppercase; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="hud-container">
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('nude-f', this)">Nude</button>
            <button class="nav-btn" onclick="toggleFolder('dresser-f', this)">Dresser</button>
            <button class="nav-btn" onclick="toggleFolder('closet-f', this)">Closet</button>
        </div>
        <div class="nav-row">
            <button class="nav-btn" onclick="toggleFolder('wardrobe-f', this)">Wardrobe</button>
            <button class="nav-btn">Minimize</button>
        </div>

        <div id="dresser-f" class="folder">
            <div class="category-item">
                <div class="header" onclick="toggleSub('undies-sub')">Undies ▼</div>
                <div id="undies-sub" class="sub-content">
                    <div class="slot-row"><span>Bra's</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
                    <div class="slot-row"><span>Panties</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
                </div>
            </div>
            <div class="category-item">
                <div class="header" onclick="toggleSub('pj-sub')">Pj's ▼</div>
                <div id="pj-sub" class="sub-content">
                    <div class="slot-row"><span>Silk Set</span><div class="slot-group"><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button><button class="style-btn"></button></div></div>
                </div>
            </div>
            <button class="remove-btn">Remove Last Attachment</button>
        </div>
        </div>

    <script>
        function toggleFolder(id, btn) {
            document.getElementById(id).classList.toggle('show');
            btn.classList.toggle('active');
        }
        function toggleSub(id) { document.getElementById(id).classList.toggle('show'); }
    </script>
</body>
</html>
